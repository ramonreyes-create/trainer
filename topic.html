<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>DeutschQuest 7.0 – Thema</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"></head>
<body><header><a class="btn" href="index.html">← Übersicht</a><h1 id="title">Thema</h1><p id="sub"></p></header><main>
<div class="progress"><span id="bar"></span></div>
<section id="menu" class="card"><h2>Aktivität wählen</h2><div class="grid" id="activities"></div></section>
<section id="work" class="card hidden"></section>
<section id="finish" class="card hidden"><h2>🎉 Fertig!</h2><p id="summary"></p><button onclick="showMenu()">Weitere Aktivität</button><a class="btn" href="index.html">Zurück</a></section>
</main><script src="js/config.js"></script><script src="js/tracking.js"></script><script>
const params=new URLSearchParams(location.search), topicId=params.get("id")||"arbeitswelt";
let topic, words=[], activity="", pos=0, score=0, attempts=0, startedAt=0, currentItems=[];
const activities=[
 ["lernen","📚 Lernen"],["zuordnung","🔗 Zuordnung"],["quiz","✅ Quiz"],["schreiben","✍️ Schreiben"],
 ["luecken","🧩 Lückentext"],["memory","🧠 Memory"],["saetze","🗣️ Sätze bilden"],["dsd","🎓 Prüfung DSD II"]
];
function $(id){return document.getElementById(id)} function clean(s){return (s||"").trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")}
function setBar(n){$("bar").style.width=n+"%"} function hide(id){$(id).classList.add("hidden")} function show(id){$(id).classList.remove("hidden")}
function shuffle(a){return a.slice().sort(()=>Math.random()-.5)} function pct(){return attempts?Math.round(score/attempts*100):100}
function showMenu(){hide("work");hide("finish");show("menu");setBar(0)}
fetch("data/topics.json").then(r=>r.json()).then(data=>{topic=data.find(t=>t.id===topicId)||data[0];words=topic.words;$("title").textContent=topic.icon+" "+topic.title;$("sub").textContent=words.length+" Wörter – DSD II";DQTracker.track("topic_page_open",{topic_id:topic.id,topic_title:topic.title});renderMenu();});
function renderMenu(){const box=$("activities");box.innerHTML="";activities.forEach(a=>{const d=document.createElement("div");d.className="activity";d.textContent=a[1];d.onclick=()=>start(a[0],a[1]);box.appendChild(d);});}
function start(id,label){activity=id;pos=0;score=0;attempts=0;startedAt=Date.now();currentItems=shuffle(words);hide("menu");show("work");setBar(5);DQTracker.track("activity_start",{topic_id:topic.id,topic_title:topic.title,activity_id:id,activity_label:label,total_items:words.length}); if(id==="lernen") renderLearn(); if(id==="zuordnung") renderMatch(); if(id==="quiz") renderQuiz(); if(id==="schreiben") renderWrite(); if(id==="luecken") renderGap(); if(id==="memory") renderMemory(); if(id==="saetze") renderSentenceBuild(); if(id==="dsd") renderDSD();}
function finish(){hide("work");show("finish");setBar(100);const seconds=Math.round((Date.now()-startedAt)/1000);$("summary").innerHTML=`Ergebnis: <b>${score}/${attempts}</b> (${pct()}%). Zeit: ${seconds} Sekunden.`;DQTracker.track("activity_finish",{topic_id:topic.id,topic_title:topic.title,activity_id:activity,score,attempts,percent:pct(),duration_seconds:seconds});}
function logAnswer(item,answer,correct,extra={}){attempts++; if(correct)score++; DQTracker.track("answer",{topic_id:topic.id,topic_title:topic.title,activity_id:activity,item_de:item.de,item_es:item.es,student_answer:answer,correct_answer:item.es,is_correct:!!correct,attempt_number:attempts,score_after:score,...extra});}
function renderLearn(){const w=currentItems[pos];setBar(Math.round((pos/words.length)*100));$("work").innerHTML=`<h2>📚 Lernen</h2><p class="pill">${pos+1}/${words.length}</p><h1>${w.de}</h1><h2>${w.es}</h2><p><b>Definition:</b> ${w.def}</p><p><b>Beispiel:</b> ${w.ex}</p><button id="known">Kann ich</button><button id="hard">Schwierig</button>`;$("known").onclick=()=>{logAnswer(w,"Kann ich",true,{mode:"self_check"});nextLearn()};$("hard").onclick=()=>{logAnswer(w,"Schwierig",false,{mode:"self_check"});nextLearn()};}
function nextLearn(){pos++; if(pos>=currentItems.length)finish(); else renderLearn();}
function renderQuiz(){if(pos>=currentItems.length)return finish();const w=currentItems[pos], opts=shuffle([w.es,...shuffle(words.filter(x=>x.es!==w.es)).slice(0,3).map(x=>x.es)]);setBar(Math.round((pos/words.length)*100));$("work").innerHTML=`<h2>✅ Quiz</h2><h1>${w.de}</h1><div id="opts"></div><p id="msg"></p>`;opts.forEach(o=>{const b=document.createElement("button");b.className="choice";b.textContent=o;b.onclick=()=>{const ok=o===w.es;logAnswer(w,o,ok);$("msg").innerHTML=ok?'<span class="ok">Richtig!</span>':'<span class="bad">Falsch.</span> Richtig: '+w.es;setTimeout(()=>{pos++;renderQuiz()},650)};$("opts").appendChild(b);});}
function renderWrite(){if(pos>=currentItems.length)return finish();const w=currentItems[pos];$("work").innerHTML=`<h2>✍️ Schreiben</h2><h1>${w.de}</h1><input id="ans" placeholder="Übersetzung auf Spanisch"><button id="check">Prüfen</button><p id="msg"></p>`;$("check").onclick=()=>{const a=$("ans").value, ok=clean(a)===clean(w.es);logAnswer(w,a,ok);$("msg").innerHTML=ok?'<span class="ok">Richtig!</span>':'<span class="bad">Falsch.</span> '+w.es;setTimeout(()=>{pos++;renderWrite()},750)};}
function renderGap(){if(pos>=currentItems.length)return finish();const w=currentItems[pos];let text=w.ex.replace(w.de,"____");if(text===w.ex) text="____ ist ein wichtiges Wort zum Thema "+topic.title+".";$("work").innerHTML=`<h2>🧩 Lückentext</h2><p>${text}</p><input id="ans" placeholder="deutsches Wort"><button id="check">Prüfen</button><p id="msg"></p>`;$("check").onclick=()=>{const a=$("ans").value, ok=clean(a)===clean(w.de);logAnswer(w,a,ok,{correct_answer:w.de});$("msg").innerHTML=ok?'<span class="ok">Richtig!</span>':'<span class="bad">Falsch.</span> '+w.de;setTimeout(()=>{pos++;renderGap()},750)};}
function renderMatch(){let left=shuffle(words.slice(0,8)), right=shuffle(left);$("work").innerHTML=`<h2>🔗 Zuordnung</h2><p>Wähle links ein Wort und dann rechts die passende Übersetzung.</p><div class="row"><div id="left"></div><div id="right"></div></div><p id="msg"></p>`;let selected=null, done=0;left.forEach(w=>{let b=document.createElement("button");b.className="choice";b.textContent=w.de;b.onclick=()=>{selected=w;$("msg").textContent="Gewählt: "+w.de};$("left").appendChild(b)});right.forEach(w=>{let b=document.createElement("button");b.className="choice";b.textContent=w.es;b.onclick=()=>{if(!selected)return;let ok=selected.es===w.es;logAnswer(selected,w.es,ok);$("msg").innerHTML=ok?'<span class="ok">Richtig!</span>':'<span class="bad">Falsch.</span>'; if(ok){b.disabled=true;done++;} if(done===left.length)finish();};$("right").appendChild(b)});}
function renderMemory(){let list=words.slice(0,8), cards=shuffle(list.flatMap((w,i)=>[{txt:w.de,id:i,w,kind:"de"},{txt:w.es,id:i,w,kind:"es"}]));$("work").innerHTML=`<h2>🧠 Memory</h2><div class="board" id="board"></div>`;let first=null,lock=false,pairs=0;cards.forEach(c=>{let d=document.createElement("div");d.className="tile";d.textContent="?";d.onclick=()=>{if(lock||d.classList.contains("done")||d===first)return;d.textContent=c.txt;d.classList.add("open");d.card=c;if(!first){first=d;return;}let ok=first.card.id===c.id;logAnswer(c.w,first.card.txt+" + "+c.txt,ok,{mode:"memory_pair"});if(ok){first.classList.add("done");d.classList.add("done");first=null;pairs++;if(pairs===list.length)finish();}else{lock=true;setTimeout(()=>{first.textContent="?";d.textContent="?";first.classList.remove("open");d.classList.remove("open");first=null;lock=false},650)}};$("board").appendChild(d)});}
function renderSentenceBuild(){if(pos>=currentItems.length)return finish();const w=currentItems[pos];$("work").innerHTML=`<h2>🗣️ Sätze bilden</h2><p>Bilde einen sinnvollen Satz mit:</p><h1>${w.de}</h1><textarea id="ans" rows="4" placeholder="Dein Satz auf Deutsch"></textarea><button id="check">Senden</button><p class="muted">Diese Aufgabe wird registriert; die Lehrkraft kann den Satz lesen.</p>`;$("check").onclick=()=>{const a=$("ans").value.trim();logAnswer(w,a,a.length>=20,{mode:"open_sentence",correct_answer:"Offene Antwort"});pos++;renderSentenceBuild();};}
function renderDSD(){ $("work").innerHTML=`<h2>🎓 Prüfung DSD II</h2><p>Schreibe einen kurzen DSD-II-Satz/Abschnitt zum Thema <b>${topic.title}</b>. Verwende mindestens drei Wörter aus der Liste.</p><p>${words.slice(0,8).map(w=>'<span class="pill">'+w.de+'</span>').join('')}</p><textarea id="ans" rows="7" placeholder="Dein Text"></textarea><button id="send">Abgeben</button>`; $("send").onclick=()=>{const a=$("ans").value; const used=words.filter(w=>a.toLowerCase().includes(w.de.toLowerCase())).length; attempts=1; score=used>=3?1:0; DQTracker.track("dsd_text_submit",{topic_id:topic.id,topic_title:topic.title,activity_id:activity,text:a,used_words:used,is_correct:used>=3}); finish();};}
</script></body></html>
